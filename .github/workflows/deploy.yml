name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Fix git ownership and pull as root
            sudo git config --global --add safe.directory /opt/binance-p2p-monitor 2>/dev/null || true
            sudo git -C /opt/binance-p2p-monitor fetch --all
            sudo git -C /opt/binance-p2p-monitor reset --hard origin/main

            # Patch paths (idempotent)
            sudo sed -i 's|CSV_FILE = "binance_p2p_uah_usdt.csv"|CSV_FILE = "/var/lib/p2p-monitor/binance_p2p_uah_usdt.csv"|' /opt/binance-p2p-monitor/binance_p2p_monitor.py 2>/dev/null || true
            sudo sed -i 's|LOG_FILE = "binance_p2p_monitor.log"|LOG_FILE = "/var/log/p2p-monitor/binance_p2p_monitor.log"|' /opt/binance-p2p-monitor/binance_p2p_monitor.py 2>/dev/null || true

            # Update dashboard
            sudo cp /opt/binance-p2p-monitor/p2p-dashboard.html /var/www/p2p-monitor/index.html

            # Restart services
            sudo systemctl restart p2p-monitor
            sudo systemctl reload nginx

            # Self-check
            sleep 3
            sudo systemctl is-active p2p-monitor && echo "Monitor: OK" || echo "Monitor: FAILED"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost)
            echo "HTTP localhost: $HTTP"
            [ "$HTTP" = "200" ] && echo "SUCCESS - dashboard is live!" || echo "WARNING - HTTP not 200"
